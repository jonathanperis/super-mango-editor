name: Build & Release

# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   push → main    builds the game AND creates a versioned GitHub Release.
#   pull_request   builds the game as a check only; no release is created.
#
# This means:
#   • Every PR from a feature branch gets a build check (the "build" job).
#   • Every merge/push to main gets a build check AND a new release (the
#     "release" job), versioned as v0.0.<run_number>.
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # BUILD JOB
  # Compiles the game on both Linux (x86_64) and macOS (arm64) in parallel.
  # Runs on every push to main AND every pull request.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # let both platforms finish even if one fails
      matrix:
        include:
          - os: ubuntu-latest
            artifact: super-mango-linux-x86_64
          - os: macos-latest
            artifact: super-mango-macos-arm64

    steps:
      # Check out the repository so the runner has access to the source code.
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Linux dependency install ────────────────────────────────────────────
      # apt packages: build tools + SDL2 and all companion library dev headers.
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev

      # ── macOS dependency install ────────────────────────────────────────────
      # Homebrew is pre-installed on macOS GitHub runners.
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 sdl2_image sdl2_ttf sdl2_mixer

      # Run `make`, which produces out/super-mango via the project Makefile.
      - name: Build
        run: make

      # Upload the compiled binary as a workflow artifact so the release job
      # (and developers investigating failures) can download it.
      # retention-days: 1 keeps storage usage low for PR build checks.
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/super-mango
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # RELEASE JOB
  # Runs ONLY when a commit is pushed to main (not on pull_request events).
  # Waits for both build matrix legs to succeed, then creates a GitHub Release
  # tagged v0.0.<run_number> with both platform binaries attached.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    # Guard: skip this job entirely for pull_request events and non-main pushes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # The GITHUB_TOKEN must have write access to repository contents to create
    # tags and releases. Scoping it here follows the principle of least privilege.
    permissions:
      contents: write

    steps:
      # Download the Linux binary into its own subdirectory so the two platform
      # binaries (both named "super-mango") don't overwrite each other.
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: super-mango-linux-x86_64
          path: dist/linux/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: super-mango-macos-arm64
          path: dist/macos/

      # Rename the binaries so each has a unique, descriptive filename before
      # they are attached to the GitHub Release.
      - name: Prepare release assets
        run: |
          mv dist/linux/super-mango dist/super-mango-linux-x86_64
          mv dist/macos/super-mango dist/super-mango-macos-arm64
          chmod +x dist/super-mango-linux-x86_64 dist/super-mango-macos-arm64

      # Create the GitHub Release. The tag is auto-created by the action.
      # softprops/action-gh-release picks up GITHUB_TOKEN automatically.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.0.${{ github.run_number }}"
          name: "Super Mango v0.0.${{ github.run_number }}"
          body: |
            Automated release built from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            ### Downloads

            | Platform      | Binary                        |
            |---------------|-------------------------------|
            | Linux x86_64  | `super-mango-linux-x86_64`    |
            | macOS arm64   | `super-mango-macos-arm64`     |

            > **Note:** Run the binary from the repository root so it can find the `assets/` folder.
          files: |
            dist/super-mango-linux-x86_64
            dist/super-mango-macos-arm64
          fail_on_unmatched_files: true
